version: '3.8'

services:
  db:
    image: mariadb:10.6
    restart: always
    command: --transaction-isolation=READ-COMMITTED --binlog-format=ROW
    volumes:
      - db_data:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-root_password_change_me}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-nextcloud_db_password_change_me}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-nextcloud}
      - MYSQL_USER=${MYSQL_USER:-nextcloud}

  redis:
    image: redis:alpine
    restart: always
    volumes:
      - redis_data:/data

  nextcloud:
    image: nextcloud:apache
    restart: always
    ports:
      - "${HTTP_PORT:-58080}:80"
    volumes:
      - nextcloud_data:/var/www/html
    environment:
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-nextcloud_db_password_change_me}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-nextcloud}
      - MYSQL_USER=${MYSQL_USER:-nextcloud}
      - MYSQL_HOST=db
      - REDIS_HOST=redis
      - OVERWRITEPROTOCOL=http
      - OVERWRITEHOST=${REDIRECT_URL}
      - NEXTCLOUD_TRUSTED_DOMAINS=*
    depends_on:
      - db
      - redis

volumes:
  db_data:
  nextcloud_data:
  redis_data:
