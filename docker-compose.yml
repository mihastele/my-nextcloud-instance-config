version: '3.8'

services:
  db:
    image: mariadb:10.6
    restart: always
    command: --transaction-isolation=READ-COMMITTED --binlog-format=ROW
    volumes:
      - db_data:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-root_password_change_me}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-nextcloud_db_password_change_me}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-nextcloud}
      - MYSQL_USER=${MYSQL_USER:-nextcloud}

  redis:
    image: redis:alpine
    restart: always
    volumes:
      - redis_data:/data

  nextcloud:
    image: nextcloud:apache
    restart: always
    volumes:
      - nextcloud_data:/var/www/html
    environment:
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-nextcloud_db_password_change_me}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-nextcloud}
      - MYSQL_USER=${MYSQL_USER:-nextcloud}
      - MYSQL_HOST=db
      - REDIS_HOST=redis
      - TRUSTED_PROXIES=webproxy
      - OVERWRITEPROTOCOL=https
      - OVERWRITEHOST=188.230.150.18:58443
      - NEXTCLOUD_TRUSTED_DOMAINS=*
    depends_on:
      - db
      - redis

  webproxy:
    image: nginx:alpine
    restart: always
    ports:
      - "${HTTPS_PORT:-58443}:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - certs:/etc/nginx/certs
    command: >
      /bin/sh -c "
      apk add --no-cache openssl &&
      if [ ! -f /etc/nginx/certs/nginx.crt ]; then
        echo \"Generating self-signed certificate...\" &&
        openssl req -x509 -nodes -days 365 -newkey rsa:2048 -keyout /etc/nginx/certs/nginx.key -out /etc/nginx/certs/nginx.crt -subj '/C=US/ST=State/L=City/O=Organization/CN=localhost'
      fi &&
      nginx -g 'daemon off;'
      "
    depends_on:
      - nextcloud

volumes:
  db_data:
  nextcloud_data:
  redis_data:
  certs:
